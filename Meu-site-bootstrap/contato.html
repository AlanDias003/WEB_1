<body>
    <header>
        <nav>
            <h1>DUNA</h1>
            <ul class="ul">
                <li>
                    <a href="index.html">início</a>

                <li>
                    <a href="contato.html">Contato</a>
                </li>
                <li>
                    <a href="produto.html">Produto</a>
                </li>
            </ul>
        </nav>

    </header>

    <main>
        <section class="cad">
            <h2>Cadastre-se para ficar por dentro de nosso site</h2>
            <br>
            <div class="form-block">
                <form class="row row-cols-lg-auto g-3 align-items-center">
                    <div class="card-item">
                        <label class="visually-hidden" for="inlineFormInputGroupUsername">Nome</label>
                        <div class="input-group">
                            <div class="input-group-text">Nome</div>
                            <input type="text" class="form-control" id="inlineFormInputGroupUsername"
                                placeholder="seu nome">
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="visually-hidden" for="inlineFormSelectPref">Preference</label>
                        <select class="form-select" id="inlineFormSelectPref">
                            <option selected>Seu estado</option>
                            <option value="São Paulo">SP</option>
                            <option value="Minas Gerais">MG</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="inlineFormCheck">
                            <label class="form-check-label" for="inlineFormCheck">
                                Remember me
                            </label>
                        </div>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>This site was made by Alan Days, the best mustach at UNIPAM (Hope you like dune just as much as I do, so we
            can talk about it toghether after this class)
        </p>
    </footer>

        </script>
</body>

</html>
